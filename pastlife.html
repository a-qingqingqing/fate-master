<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>前世轮回 - 天命阁</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a84c;--gold-light:#e8d48b;--gold-dark:#8a6d2b;--gold-glow:rgba(201,168,76,0.4);--cinnabar:#c23b22;--cinnabar-light:#e85d4a;--cinnabar-glow:rgba(194,59,34,0.3);--ink-black:#1a1410;--ink-dark:#2a221c;--ink-mid:#3d322a;--ink-light:#4d3d32;--text-primary:#f0e6d0;--text-muted:#a89878;--text-dim:#6a5d4a}
html{scroll-behavior:smooth}
body{font-family:'Noto Serif SC',serif;background:var(--ink-black);color:var(--text-primary);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.bg-layer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2}
.bg-layer .grad{position:absolute;width:100%;height:100%;background:radial-gradient(ellipse at 20% 50%,rgba(201,168,76,0.07) 0%,transparent 55%),radial-gradient(ellipse at 80% 20%,rgba(194,59,34,0.05) 0%,transparent 55%),radial-gradient(ellipse at 50% 85%,rgba(201,168,76,0.04) 0%,transparent 50%)}
.bg-layer .pattern{position:absolute;width:100%;height:100%;background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.008) 2px,rgba(255,255,255,0.008) 3px);pointer-events:none}
.bg-layer .noise{position:absolute;width:100%;height:100%;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.float-char{position:fixed;font-family:'Ma Shan Zheng',cursive;color:var(--gold);opacity:0.035;font-size:140px;pointer-events:none;z-index:-1;animation:floatDrift 25s ease-in-out infinite}
.float-char:nth-child(5){top:8%;left:3%;animation-delay:0s}
.float-char:nth-child(6){top:55%;left:88%;animation-delay:-6s;font-size:170px}
.float-char:nth-child(7){top:28%;left:92%;animation-delay:-12s;font-size:100px}
.float-char:nth-child(8){top:78%;left:5%;animation-delay:-18s;font-size:130px}
@keyframes floatDrift{0%,100%{transform:translateY(0)rotate(0deg)scale(1)}25%{transform:translateY(-35px)rotate(6deg)scale(1.03)}75%{transform:translateY(25px)rotate(-4deg)scale(0.97)}}
.main{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:30px 16px 60px}
.header{text-align:center;padding:50px 16px 36px;opacity:0;transform:translateY(30px);animation:headerIn 1.6s ease-out forwards}
@keyframes headerIn{to{opacity:1;transform:translateY(0)}}
.header-badge{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--gold-dark);color:var(--gold-light);padding:3px 18px;font-size:11px;letter-spacing:5px;margin-bottom:20px;opacity:0.7;border-radius:2px}
.header-title{font-family:'Ma Shan Zheng',cursive;font-size:clamp(42px,10vw,76px);color:var(--gold);line-height:1.05;text-shadow:0 0 50px var(--gold-glow),0 3px 6px rgba(0,0,0,0.6);position:relative;display:inline-block}
.header-title .title-deco{position:absolute;bottom:-6px;left:8%;width:84%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.header-sub{font-family:'Liu Jian Mao Cao',cursive;font-size:clamp(18px,3.5vw,28px);color:var(--cinnabar-light);margin-top:16px;opacity:0.85}
.header-desc{color:var(--text-muted);font-size:14px;line-height:1.9;margin-top:20px;max-width:520px;margin-left:auto;margin-right:auto}
.divider{display:flex;align-items:center;justify-content:center;gap:14px;margin:32px 0;opacity:0.5}
.divider-line{flex:1;max-width:100px;height:1px}
.divider-line.l{background:linear-gradient(90deg,transparent,var(--gold-dark))}
.divider-line.r{background:linear-gradient(90deg,var(--gold-dark),transparent)}
.input-group{margin-bottom:20px}
.input-group label{display:block;font-size:13px;color:var(--gold-light);margin-bottom:6px;letter-spacing:1px}
.input-group input,.input-group select{width:100%;padding:12px 16px;background:var(--ink-dark);border:1px solid rgba(201,168,76,0.2);border-radius:8px;color:var(--text-primary);font-family:inherit;font-size:14px;outline:none;transition:border-color 0.3s}
.input-group input:focus,.input-group select:focus{border-color:var(--gold)}
.input-group select option{background:var(--ink-dark);color:var(--text-primary)}
.btn{display:inline-block;padding:14px 36px;border-radius:8px;font-family:'Ma Shan Zheng',cursive;font-size:18px;cursor:pointer;border:none;transition:all 0.4s;text-decoration:none;max-width:360px;width:100%;letter-spacing:3px}
.btn-primary{background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:var(--ink-black);font-weight:700;box-shadow:0 4px 24px var(--gold-glow)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 36px var(--gold-glow)}
.btn-outline{background:transparent;border:1px solid var(--gold-dark);color:var(--gold)}
.btn-outline:hover{background:rgba(201,168,76,0.07);border-color:var(--gold)}
.load{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(26,20,16,0.96);z-index:100;justify-content:center;align-items:center;flex-direction:column}
.load.active{display:flex}
.load-ring{width:72px;height:72px;position:relative;margin-bottom:36px}
.load-ring .r{position:absolute;width:100%;height:100%;border:2px solid transparent;border-top-color:var(--gold);border-radius:50%;animation:spin 2s linear infinite}
.load-ring .r:nth-child(2){width:68%;height:68%;top:16%;left:16%;border-top-color:var(--cinnabar-light);animation-direction:reverse;animation-duration:1.4s}
.load-ring .r:nth-child(3){width:36%;height:36%;top:32%;left:32%;border-top-color:var(--gold-light);animation-duration:0.9s}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-family:'Ma Shan Zheng',cursive;font-size:22px;color:var(--gold-light);letter-spacing:5px;animation:pulse 1.6s ease-in-out infinite}
.load-sub{font-size:12px;color:var(--text-muted);margin-top:10px;letter-spacing:2px}
@keyframes pulse{0%,100%{opacity:0.35}50%{opacity:1}}

/* ===== 轮回结果 ===== */
.reincarn-section{display:none;opacity:0;transition:opacity 0.8s}
.reincarn-section.active{display:block;opacity:1}
.life-timeline{position:relative;padding-left:40px}
.life-timeline::before{content:'';position:absolute;left:15px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--gold),var(--cinnabar),var(--gold),transparent)}
.life-card{position:relative;margin-bottom:36px;opacity:0;transform:translateY(24px);animation:cardIn 0.7s ease-out forwards}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}
.life-dot{position:absolute;left:-33px;top:28px;width:14px;height:14px;border-radius:50%;border:2px solid var(--gold);background:var(--ink-black);z-index:2}
.life-dot.current{border-color:var(--cinnabar-light);background:var(--cinnabar);box-shadow:0 0 12px var(--cinnabar-glow)}
.life-card-inner{background:linear-gradient(145deg,rgba(42,34,28,0.96),rgba(26,20,16,0.99));border:1px solid rgba(201,168,76,0.12);border-radius:12px;padding:28px 24px;overflow:hidden;position:relative}
.life-card-inner::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--cinnabar),var(--gold));opacity:0.5}
.life-era{display:inline-flex;align-items:center;gap:6px;padding:3px 14px;border-radius:3px;font-size:11px;letter-spacing:2px;margin-bottom:12px;border:1px solid rgba(201,168,76,0.2);color:var(--gold-light);background:rgba(201,168,76,0.04)}
.life-era.current-era{border-color:var(--cinnabar);color:var(--cinnabar-light);background:rgba(194,59,34,0.08)}
.life-identity{font-family:'Ma Shan Zheng',cursive;font-size:26px;color:var(--gold);margin:8px 0 4px;letter-spacing:1px}
.life-desc{color:var(--text-muted);font-size:13px;line-height:1.8;margin:10px 0}
.life-details{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.life-detail-item{padding:10px 12px;background:rgba(61,50,42,0.2);border-radius:6px;border:1px solid rgba(201,168,76,0.06);font-size:12px}
.life-detail-item .dl{color:var(--text-muted);font-size:11px;margin-bottom:3px}
.life-detail-item .dv{color:var(--gold-light);font-size:14px;font-family:'Ma Shan Zheng',cursive}
.life-quote{margin-top:14px;padding:12px 16px;border-left:2px solid var(--cinnabar);background:rgba(194,59,34,0.04);border-radius:0 6px 6px 0;font-size:13px;color:var(--text-muted);font-style:italic;line-height:1.7}
.life-skill{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.life-skill span{padding:3px 10px;border-radius:12px;font-size:11px;border:1px solid rgba(201,168,76,0.15);color:var(--text-muted);background:rgba(201,168,76,0.03)}
.life-soul-score{text-align:center;margin:20px 0;padding:24px;background:linear-gradient(145deg,rgba(42,34,28,0.96),rgba(26,20,16,0.99));border:1px solid rgba(201,168,76,0.2);border-radius:12px}
.life-soul-score .score-label{font-size:12px;color:var(--text-muted);letter-spacing:3px;margin-bottom:8px}
.life-soul-score .score-num{font-family:'Ma Shan Zheng',cursive;font-size:64px;color:var(--gold);text-shadow:0 0 40px var(--gold-glow)}
.life-soul-score .score-desc{font-size:13px;color:var(--text-muted);margin-top:8px;line-height:1.6}
.life-summary{text-align:center;padding:20px;margin-top:16px;background:rgba(194,59,34,0.05);border:1px solid rgba(194,59,34,0.12);border-radius:10px}
.life-summary h3{font-family:'Ma Shan Zheng',cursive;font-size:22px;color:var(--cinnabar-light);margin-bottom:10px}
.life-summary p{font-size:13px;color:var(--text-muted);line-height:1.9;max-width:560px;margin:0 auto}
.btn-area{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:28px}
.btn-area .btn{max-width:300px}
.back-link{text-align:center;margin-top:16px}
.back-link a{color:var(--text-muted);font-size:13px;text-decoration:none;border-bottom:1px solid rgba(201,168,76,0.15);padding-bottom:2px;transition:color 0.3s}
.back-link a:hover{color:var(--gold)}
@media(max-width:500px){.life-details{grid-template-columns:1fr}.header-title{font-size:42px}}
</style>
</head>
<body>
<div class="bg-layer"><div class="grad"></div><div class="pattern"></div><div class="noise"></div></div>
<div class="float-char">命</div><div class="float-char">缘</div><div class="float-char">轮</div><div class="float-char">回</div>

<div class="main">
  <div class="header">
    <div class="header-badge">✦ 天 命 阁 ✦</div>
    <div class="header-title">前世轮回<span class="title-deco"></span></div>
    <div class="header-sub">孟婆汤忘前尘事 · 六道轮回续今生缘</div>
    <div class="header-desc">据传人死后须过奈何桥、饮孟婆汤，方忘却前世种种。然若以八字入卦，或可窥探轮回之一二。请输入您的基本信息，开启五世轮回之旅。</div>
  </div>

  <div class="divider"><span class="divider-line l"></span><span class="divider-icon">◈</span><span class="divider-line r"></span></div>

  <!-- ===== 输入区域 ===== -->
  <div id="inputSection">
    <div class="input-group">
      <label>姓名</label>
      <input type="text" id="pName" placeholder="请输入您的姓名...">
    </div>
    <div class="input-group">
      <label>性别</label>
      <select id="pGender">
        <option value="">-- 请选择 --</option>
        <option value="male">乾造 · 男命</option>
        <option value="female">坤造 · 女命</option>
      </select>
    </div>
    <div class="input-group">
      <label>出生年份（公历）</label>
      <select id="pYear"></select>
    </div>
    <div class="input-group">
      <label>出生月份</label>
      <select id="pMonth"></select>
    </div>
    <div class="input-group">
      <label>出生日期</label>
      <select id="pDay"></select>
    </div>
    <div style="text-align:center;margin-top:28px;">
      <button class="btn btn-primary" id="startBtn">◈ 开 启 轮 回 ◈</button>
    </div>
  </div>

  <!-- ===== 加载 ===== -->
  <div class="load" id="loading">
    <div class="load-ring"><div class="r"></div><div class="r"></div><div class="r"></div></div>
    <div class="load-txt" id="loadTxt">正在打开轮回之门...</div>
    <div class="load-sub" id="loadSub">沟通冥界中，请耐心等待</div>
  </div>

  <!-- ===== 轮回结果 ===== -->
  <div class="reincarn-section" id="resultSection"></div>
</div>

<script>
(function(){
// ===== 填充年月日 =====
var ySel=document.getElementById('pYear'),mSel=document.getElementById('pMonth'),dSel=document.getElementById('pDay');
for(var y=2026;y>=1940;y--){var o=document.createElement('option');o.value=y;o.text=y+'年';ySel.add(o)}
for(var m=1;m<=12;m++){var o=document.createElement('option');o.value=m;o.text=m+'月';mSel.add(o)}
function updDays(){var y=parseInt(ySel.value),m=parseInt(mSel.value);dSel.innerHTML='';var max=31;if(m===4||m===6||m===9||m===11)max=30;if(m===2){max=((y%4===0&&y%100!==0)||(y%400===0))?29:28}for(var d=1;d<=max;d++){var o=document.createElement('option');o.value=d;o.text=d+'日';dSel.add(o)}}
ySel.onchange=mSel.onchange=updDays;updDays();

// ===== 数据库 =====
var ERAS=[
 {name:'远古洪荒',years:'约公元前3000年',desc:'天地初开，万物始生',bg:'天地混沌初开之世'},
 {name:'夏商周',years:'约公元前2070-前256年',desc:'青铜文明，礼乐肇始',bg:'华夏文明曙光初现'},
 {name:'春秋战国',years:'公元前770-前221年',desc:'百家争鸣，诸侯争霸',bg:'烽火连天百家争鸣'},
 {name:'秦汉',years:'公元前221-公元220年',desc:'天下一统，丝路通达',bg:'大漠孤烟直长河落日圆'},
 {name:'三国两晋',years:'公元220-420年',desc:'英雄辈出，乱世风云',bg:'滚滚长江东逝水'},
 {name:'南北朝',years:'公元420-589年',desc:'南北对峙，佛教大兴',bg:'南朝四百八十寺'},
 {name:'隋唐',years:'公元581-907年',desc:'盛世繁华，万国来朝',bg:'长安水边多丽人'},
 {name:'五代十国',years:'公元907-979年',desc:'藩镇割据，群雄并起',bg:'五代兴亡如梦间'},
 {name:'宋元',years:'公元960-1368年',desc:'文风鼎盛，铁骑横扫',bg:'醉里挑灯看剑'},
 {name:'明朝',years:'公元1368-1644年',desc:'航海壮举，锦衣暗涌',bg:'天子守国门君王死社稷'},
 {name:'清朝',years:'公元1644-1912年',desc:'康乾盛世，末路悲歌',bg:'落花时节又逢君'},
 {name:'民国',years:'公元1912-1949年',desc:'风云激荡，家国存亡',bg:'铁马冰河入梦来'},
 {name:'今生',years:'当代',desc:'红尘俗世，当下轮回',bg:'滚滚红尘中'}
];

var ROLES_MALE={
  '远古洪荒':[
   {id:'shaman',name:'远古部落大祭司',type:'神职',skill:['占卜','祈雨','草药','驱邪'],desc:'手持骨杖，口诵咒语，沟通天地神灵，为族人指引吉凶祸福。你以星辰之轨定四时更替，以兽骨裂纹断事之吉凶。'},
   {id:'hunter',name:'原始部落猎手王',type:'武职',skill:['狩猎','追踪','搏斗','制造工具'],desc:'力能搏虎，箭无虚发。你率领族人深入莽荒猎杀猛兽，以兽皮御寒，以猎肉果腹。你是部落中最勇猛的战士。'},
   {id:'chief',name:'远古部落首领',type:'王权',skill:['统领','外交','农耕','占卜'],desc:'身披兽皮，头戴羽冠，统领方圆百里之部落。你制定族规，调解纷争，带领族人在蛮荒中开疆拓土、繁衍生息。'}
  ],
  '夏商周':[
   {id:'diviner',name:'王室御用卜官',type:'神职',skill:['甲骨占卜','祭祀','礼乐','星象'],desc:'掌管龟甲兽骨之占卜，为王室决断军国大事。每逢征伐祭祀，必先由你烧裂龟甲，解读神意，一言可定天下兴亡。'},
   {id:'general1',name:'诸侯国将军',type:'武职',skill:['兵法','剑术','骑射','阵法'],desc:'执戈披甲，统帅三千铁骑。你以排兵布阵闻名诸侯，攻城略地所向披靡。忠心辅佐君主，以战功封侯拜将。'},
   {id:'artisan',name:'青铜铸造大师',type:'技艺',skill:['铸造','冶炼','雕刻','礼器设计'],desc:'炉火纯青，巧夺天工。你为天子铸造国之重器，鼎彝尊爵皆出你手。每一件青铜器上的纹饰，都蕴含着你对天道人伦的参悟。'}
  ],
  '春秋战国':[
   {id:'strategist',name:'纵横家谋士',type:'谋略',skill:['游说','纵横','策论','舌辩'],desc:'一舌可敌百万师，三寸之舌辨诸侯。你游走列国，以纵横捭阖之术搅动天下大势，一计可定一国之兴亡。'},
   {id:'swordsman',name:'江湖游侠',type:'侠义',skill:['剑术','轻功','易容','暗器'],desc:'十步杀一人，千里不留行。你身佩长剑行走江湖，路见不平拔剑相助，事了拂衣去，深藏身与名。'},
   {id:'scholar1',name:'诸子百家传人',type:'学术',skill:['讲学','论道','著书','辩论'],desc:'心怀天下，游学四方。你传承先师之学，开馆授徒，著书立说。弟子三千，贤人七十二，学说影响了后世千年。'}
  ],
  '秦汉':[
   {id:'general2',name:'沙场虎将',type:'武职',skill:['骑射','刀法','兵法','防御'],desc:'饮马瀚海，封狼居胥。你率铁骑北击匈奴，西征大宛，战功赫赫名震天下。你的名字刻在朝廷功臣榜上，流芳百世。'},
   {id:'doctor1',name:'太医院御医',type:'医术',skill:['诊脉','针灸','方剂','炼丹'],desc:'悬壶济世，妙手回春。你为天子后妃诊治疑难杂症，以银针祛病、草药调和阴阳，活人无数。'},
   {id:'official1',name:'朝廷重臣',type:'文官',skill:['律法','治政','巡视','上书'],desc:'位极人臣，权重朝野。你辅佐天子治理天下，推行仁政，兴修水利，轻徭薄赋，使百姓安居乐业。'}
  ],
  '三国两晋':[

var SOUL_TRAITS=['灵魂色彩：纯金色 — 至纯至善','灵魂色彩：深紫色 — 深沉内敛','灵魂色彩：碧蓝色 — 睿智通透','灵魂色彩：赤红色 — 热烈执着','灵魂色彩：翡翠绿 — 生机勃勃','灵魂色彩：银白色 — 空灵脱俗','灵魂色彩：暗金色 — 历经沧桑','灵魂色彩：绯红色 — 情感丰富','灵魂色彩：靛蓝色 — 洞察一切','灵魂色彩：琥珀色 — 温暖包容'];
var BOND_TYPES=['前世的你与今生某人是主仆关系','前世的你为今生某人挡过一刀','前世的你与今生某人是结拜兄弟/姐妹','前世的你欠今生某人一笔债','前世的你与今生某人是师徒关系','前世的你与今生某人是恋人，却未能在一起','前世的你曾救过今生某人的命','前世的你与今生某人是挚友，肝胆相照'];
var SUMMARY_TEMPLATES=[
  '综观五世轮回，{name}的灵魂经历了从{role1}到{role2}的流转。{trait}，每一世的经历都为今生留下了深深的印记——{inherit}。',
  '五世轮回如同一部波澜壮阔的史诗。{name}在漫长的时光中经历了{role1}、{role2}等身份，{trait}。今生所拥有的{inherit}，正是前世累积的因果。'
];

// ===== 哈希函数 =====
function hash(n,s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return((h%Math.abs(n))+Math.abs(n))%n}
function pick(arr,seed){return arr[hash(arr.length,seed)%arr.length]}
function pickN(arr,n,seed){var a=[],used={};for(var i=0;i<Math.min(n,arr.length);i++){var idx=hash(arr.length,seed+i*i);while(used[idx]){idx=(idx+1)%arr.length}used[idx]=true;a.push(arr[idx])}return a}

// ===== 生成五世轮回 =====
function generateReincarnation(name,gender,year,month,day){
  var seed=name+gender+year+month+day;
  var eras=[ERAS[0],ERAS[2],ERAS[7],ERAS[9],ERAS[12]]; // 远古、春秋战国、五代十国、明朝、今生
  var roles=gender==='male'?ROLES_MALE:ROLES_FEMALE;
  var lives=[];
  var loadTexts=['正在打开轮回之门...','翻阅生死簿中...','穿越时空隧道...','追忆前尘往事...','因果轮回显现...'];
  
  for(var i=0;i<5;i++){
    var era=eras[i];
    var eraName=era.name;
    var rolePool=roles[eraName]||roles['隋唐'];
    var role=rolePool[hash(rolePool.length,seed+i*7)%rolePool.length];
    var karmaType=hash(3,seed+'k'+i);
    var karma=karmaType===0?pick(KARMA_GOOD,seed+'kg'+i):karmaType===1?pick(KARMA_BAD,seed+'kb'+i):pick(KARMA_NEUTRAL,seed+'kn'+i);
    var death=pick(CAUSE_DEATH,seed+'d'+i);
    var bond=pick(BOND_TYPES,seed+'b'+i);
    var birthYear=hash(80,seed+'by'+i)+1;
    var age=hash(70,seed+'age'+i)+20;
    var soulTrait=pick(SOUL_TRAITS,seed+'st'+i);
    lives.push({
      era:eraName,eraYears:era.years,eraBg:era.bg,
      identity:role.name,type:role.type,skills:role.skill,desc:role.desc,
      karma:karma,death:death,bond:bond,
      birthYear:birthYear,age:age,soulTrait:soulTrait,
      isCurrent:i===4
    });
  }
  return{lives:lives,loadTexts:loadTexts,seed:seed};
}

// ===== 渲染结果 =====
function renderResult(data,name){
  var html='';
  for(var i=0;i<data.lives.length;i++){
    var l=data.lives[i];
    html+='<div class="life-card" style="animation-delay:'+(0.3+i*0.3)+'s">';
    html+='<div class="life-dot'+(l.isCurrent?' current':'')+'"></div>';
    html+='<div class="life-card-inner">';
    html+='<div class="life-era'+(l.isCurrent?' current-era':'')+'">第'+(i+1)+'世 · '+l.era+' · '+l.eraYears+'</div>';
    html+='<div class="life-identity">'+(l.isCurrent?'➤ ':'')+l.identity+'</div>';
    html+='<div class="life-desc">'+l.eraBg+'。'+l.desc+'</div>';
    html+='<div class="life-details">';
    html+='<div class="life-detail-item"><div class="dl">身份类型</div><div class="dv">'+l.type+'</div></div>';
    html+='<div class="life-detail-item"><div class="dl">享年</div><div class="dv">'+l.age+'岁</div></div>';
    html+='<div class="life-detail-item"><div class="dl">因果善恶</div><div class="dv">'+l.karma+'</div></div>';
    html+='<div class="life-detail-item"><div class="dl">辞世原因</div><div class="dv">'+l.death+'</div></div>';
    html+='</div>';
    html+='<div class="life-skill">';
    html+='<span style="color:var(--text-muted);font-size:11px;">擅长：</span>';
    for(var j=0;j<l.skills.length;j++)html+='<span>'+l.skills[j]+'</span>';
    html+='</div>';
    html+='<div class="life-quote">「'+l.bond+'」</div>';
    if(l.soulTrait)html+='<div style="margin-top:8px;font-size:11px;color:var(--text-dim);">'+l.soulTrait+'</div>';
    html+='</div></div>';
  }
  
  // 灵魂总评
  var soulScore=hash(41,data.seed+'score')+60;
  var soulDesc=soulScore>=90?'你的灵魂经历了漫长而丰富的轮回，积累了深厚的善业与智慧。今生你注定不凡，前世的一切苦难与辉煌都化为了今生的力量。':soulScore>=75?'你的灵魂在轮回中不断成长，虽有坎坷但也有辉煌。今生你拥有前世累积的经验与福报，好好把握。':soulScore>=60?'你的灵魂尚在轮回的修行途中，每一世都在学习新的功课。今生是你蜕变的关键时刻。';
  
  html+='<div class="life-soul-score">';
  html+='<div class="score-label">灵 魂 累 积 评 分</div>';
  html+='<div class="score-num">'+soulScore+'</div>';
  html+='<div class="score-desc">'+soulDesc+'</div>';
  html+='</div>';
  
  // 总结
  var tpl=pick(SUMMARY_TEMPLATES,data.seed+'sum');
  var trait=pick(KARMA_GOOD,data.seed+'tr');
  var inherit=pick(['坚韧不拔的意志','敏锐的洞察力','与生俱来的才华','善良正直的品性','强大的生命力','对美好事物的追求'],data.seed+'inh');
  var role1=data.lives[0].identity;
  var role2=data.lives[3].identity;
  var summary=tpl.replace('{name}',name).replace('{role1}',role1).replace('{role2}',role2).replace('{trait}',trait).replace('{inherit}',inherit);
  
  html+='<div class="life-summary">';
  html+='<h3>轮回总悟</h3>';
  html+='<p>'+summary+'</p>';
  html+='</div>';
  
  // 按钮
  html+='<div class="btn-area">';
  html+='<button class="btn btn-primary" onclick="location.reload()">◈ 再探一次轮回 ◈</button>';
  html+='<button class="btn btn-outline" id="backHomeBtn">◈ 返回天命阁 ◈</button>';
  html+='</div>';
  html+='<div class="back-link"><a href="index.html">← 返回首页</a></div>';
  
  document.getElementById('resultSection').innerHTML='<div class="life-timeline">'+html+'</div>';
}

// ===== 按钮事件 =====
document.getElementById('startBtn').addEventListener('click',function(){
  var name=document.getElementById('pName').value.trim();
  var gender=document.getElementById('pGender').value;
  var year=document.getElementById('pYear').value;
  var month=document.getElementById('pMonth').value;
  var day=document.getElementById('pDay').value;
  
  if(!name){alert('请输入您的姓名');return}
  if(!gender){alert('请选择性别');return}
  if(!year||!month||!day){alert('请完整填写出生日期');return}
  
  document.getElementById('inputSection').style.display='none';
  var load=document.getElementById('loading');
  load.classList.add('active');
  
  var data=generateReincarnation(name,gender,parseInt(year),parseInt(month),parseInt(day));
  var texts=['正在打开轮回之门...沟通冥界中...','翻阅生死簿中...追忆前尘往事...','穿越时空隧道...溯游而上...','追寻第一世魂影...渐渐清晰...','五世因果显现...轮回画卷展开...'];
  var idx=0;
  var loadTxt=document.getElementById('loadTxt');
  var loadSub=document.getElementById('loadSub');
  var timer=setInterval(function(){
    idx=(idx+1)%texts.length;
    loadTxt.textContent=texts[idx].split('...')[0]+'...';
    loadSub.textContent=texts[idx].split('...')[1]||'';
  },1800);
  
  setTimeout(function(){
    clearInterval(timer);
    load.classList.remove('active');
    renderResult(data,name);
    var rs=document.getElementById('resultSection');
    rs.style.display='block';
    setTimeout(function(){rs.classList.add('active');rs.scrollIntoView({behavior:'smooth',block:'start'})},50);
  },5500);
});

document.getElementById('backHomeBtn').addEventListener('click',function(){
  window.location.href='index.html';
});
})();
</script>
