<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>前世轮回 - 天命阁</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a84c;--gold-light:#e8d48b;--gold-dark:#8a6d2b;--gold-glow:rgba(201,168,76,0.4);--cinnabar:#c23b22;--cinnabar-light:#e85d4a;--cinnabar-glow:rgba(194,59,34,0.3);--ink-black:#1a1410;--ink-dark:#2a221c;--ink-mid:#3d322a;--ink-light:#4d3d32;--text-primary:#f0e6d0;--text-muted:#a89878;--text-dim:#6a5d4a}
html{scroll-behavior:smooth}
body{font-family:'Noto Serif SC',serif;background:var(--ink-black);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
.bg-layer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2}
.bg-layer .grad{position:absolute;width:100%;height:100%;background:radial-gradient(ellipse at 20% 50%,rgba(201,168,76,0.07) 0%,transparent 55%),radial-gradient(ellipse at 80% 20%,rgba(194,59,34,0.05) 0%,transparent 55%),radial-gradient(ellipse at 50% 85%,rgba(201,168,76,0.04) 0%,transparent 50%)}
.bg-layer .pattern{position:absolute;width:100%;height:100%;background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.008) 2px,rgba(255,255,255,0.008) 3px);pointer-events:none}
.float-char{position:fixed;font-family:'Ma Shan Zheng',cursive;color:var(--gold);opacity:0.035;font-size:140px;pointer-events:none;z-index:-1;animation:floatDrift 25s ease-in-out infinite}
.float-char:nth-child(5){top:8%;left:3%}
.float-char:nth-child(6){top:55%;left:88%;animation-delay:-6s;font-size:170px}
.float-char:nth-child(7){top:28%;left:92%;animation-delay:-12s;font-size:100px}
.float-char:nth-child(8){top:78%;left:5%;animation-delay:-18s;font-size:130px}
@keyframes floatDrift{0%,100%{transform:translateY(0)rotate(0deg)scale(1)}25%{transform:translateY(-35px)rotate(6deg)scale(1.03)}75%{transform:translateY(25px)rotate(-4deg)scale(0.97)}}
.main{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:30px 16px 60px}
.header{text-align:center;padding:50px 16px 36px;opacity:0;transform:translateY(30px);animation:headerIn 1.6s ease-out forwards}
@keyframes headerIn{to{opacity:1;transform:translateY(0)}}
.header-badge{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--gold-dark);color:var(--gold-light);padding:3px 18px;font-size:11px;letter-spacing:5px;margin-bottom:20px;opacity:0.7;border-radius:2px}
.header-title{font-family:'Ma Shan Zheng',cursive;font-size:clamp(42px,10vw,76px);color:var(--gold);line-height:1.05;text-shadow:0 0 50px var(--gold-glow),0 3px 6px rgba(0,0,0,0.6);position:relative;display:inline-block}
.header-title .title-deco{position:absolute;bottom:-6px;left:8%;width:84%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.header-sub{font-family:'Liu Jian Mao Cao',cursive;font-size:clamp(18px,3.5vw,28px);color:var(--cinnabar-light);margin-top:16px;opacity:0.85}
.header-desc{color:var(--text-muted);font-size:14px;line-height:1.9;margin-top:20px;max-width:520px;margin-left:auto;margin-right:auto}
.divider{display:flex;align-items:center;justify-content:center;gap:14px;margin:32px 0;opacity:0.5}
.divider-line{flex:1;max-width:100px;height:1px}
.divider-line.l{background:linear-gradient(90deg,transparent,var(--gold-dark))}
.divider-line.r{background:linear-gradient(90deg,var(--gold-dark),transparent)}
.input-group{margin-bottom:20px}
.input-group label{display:block;font-size:13px;color:var(--gold-light);margin-bottom:6px;letter-spacing:1px}
.input-group input,.input-group select{width:100%;padding:12px 16px;background:var(--ink-dark);border:1px solid rgba(201,168,76,0.2);border-radius:8px;color:var(--text-primary);font-family:inherit;font-size:14px;outline:none;transition:border-color 0.3s}
.input-group input:focus,.input-group select:focus{border-color:var(--gold)}
.input-group select option{background:var(--ink-dark);color:var(--text-primary)}
.btn{display:inline-block;padding:14px 36px;border-radius:8px;font-family:'Ma Shan Zheng',cursive;font-size:18px;cursor:pointer;border:none;transition:all 0.4s;text-decoration:none;max-width:360px;width:100%;letter-spacing:3px}
.btn-primary{background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:var(--ink-black);font-weight:700;box-shadow:0 4px 24px var(--gold-glow)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 36px var(--gold-glow)}
.btn-outline{background:transparent;border:1px solid var(--gold-dark);color:var(--gold)}
.btn-outline:hover{background:rgba(201,168,76,0.07);border-color:var(--gold)}
.load{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(26,20,16,0.96);z-index:100;justify-content:center;align-items:center;flex-direction:column}
.load.active{display:flex}
.load-ring{width:72px;height:72px;position:relative;margin-bottom:36px}
.load-ring .r{position:absolute;width:100%;height:100%;border:2px solid transparent;border-top-color:var(--gold);border-radius:50%;animation:spin 2s linear infinite}
.load-ring .r:nth-child(2){width:68%;height:68%;top:16%;left:16%;border-top-color:var(--cinnabar-light);animation-direction:reverse;animation-duration:1.4s}
.load-ring .r:nth-child(3){width:36%;height:36%;top:32%;left:32%;border-top-color:var(--gold-light);animation-duration:0.9s}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-family:'Ma Shan Zheng',cursive;font-size:22px;color:var(--gold-light);letter-spacing:5px;animation:pulse 1.6s ease-in-out infinite}
.load-sub{font-size:12px;color:var(--text-muted);margin-top:10px;letter-spacing:2px}
@keyframes pulse{0%,100%{opacity:0.35}50%{opacity:1}}
.bazi-plate{background:linear-gradient(145deg,rgba(42,34,28,0.96),rgba(26,20,16,0.99));border:1px solid rgba(201,168,76,0.15);border-radius:12px;padding:24px;margin:16px 0;overflow:hidden;position:relative}
.bazi-plate::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--cinnabar),var(--gold))}
.bazi-plate h3{font-family:'Ma Shan Zheng',cursive;font-size:20px;color:var(--gold-light);text-align:center;margin-bottom:16px}
.bazi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center}
.bazi-col{padding:12px 8px;background:rgba(61,50,42,0.15);border-radius:8px;border:1px solid rgba(201,168,76,0.08)}
.bazi-col .col-label{font-size:11px;color:var(--text-muted);margin-bottom:6px}
.bazi-col .col-gz{font-family:'Ma Shan Zheng',cursive;font-size:22px;color:var(--gold);letter-spacing:2px}
.bazi-col .col-wx{font-size:11px;margin-top:4px;padding:2px 6px;border-radius:3px;display:inline-block}
.wx-jin{background:rgba(212,175,55,0.15);color:#d4af37;border:1px solid rgba(212,175,55,0.3)}
.wx-mu{background:rgba(76,175,80,0.15);color:#81c784;border:1px solid rgba(76,175,80,0.3)}
.wx-shui{background:rgba(66,165,245,0.15);color:#64b5f6;border:1px solid rgba(66,165,245,0.3)}
.wx-huo{background:rgba(244,67,54,0.15);color:#ef9a9a;border:1px solid rgba(244,67,54,0.3)}
.wx-tu{background:rgba(255,193,7,0.15);color:#ffd54f;border:1px solid rgba(255,193,7,0.3)}
.wx-info{margin-top:14px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.wx-info span{font-size:11px;color:var(--text-muted);padding:3px 10px;border-radius:12px;border:1px solid rgba(201,168,76,0.12);background:rgba(201,168,76,0.03)}
.life-timeline{position:relative;padding-left:40px}
.life-timeline::before{content:'';position:absolute;left:15px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--gold),var(--cinnabar),var(--gold),transparent)}
.life-card{position:relative;margin-bottom:40px;opacity:0;transform:translateY(24px);animation:cardIn 0.7s ease-out forwards}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}
.life-dot{position:absolute;left:-33px;top:28px;width:14px;height:14px;border-radius:50%;border:2px solid var(--gold);background:var(--ink-black);z-index:2}
.life-dot.current{border-color:var(--cinnabar-light);background:var(--cinnabar);box-shadow:0 0 12px var(--cinnabar-glow)}
.life-card-inner{background:linear-gradient(145deg,rgba(42,34,28,0.96),rgba(26,20,16,0.99));border:1px solid rgba(201,168,76,0.12);border-radius:12px;padding:28px 24px;overflow:hidden;position:relative}
.life-card-inner::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--cinnabar),var(--gold));opacity:0.5}
.life-era{display:inline-flex;align-items:center;gap:6px;padding:3px 14px;border-radius:3px;font-size:11px;letter-spacing:2px;margin-bottom:12px;border:1px solid rgba(201,168,76,0.2);color:var(--gold-light);background:rgba(201,168,76,0.04)}
.life-era.current-era{border-color:var(--cinnabar);color:var(--cinnabar-light);background:rgba(194,59,34,0.08)}
.life-identity{font-family:'Ma Shan Zheng',cursive;font-size:26px;color:var(--gold);margin:8px 0 4px;letter-spacing:1px}
.life-desc{color:var(--text-muted);font-size:13px;line-height:1.9;margin:12px 0}
.life-details{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.life-detail-item{padding:10px 12px;background:rgba(61,50,42,0.2);border-radius:6px;border:1px solid rgba(201,168,76,0.06);font-size:12px}
.life-detail-item .dl{color:var(--text-muted);font-size:11px;margin-bottom:3px}
.life-detail-item .dv{color:var(--gold-light);font-size:14px;font-family:'Ma Shan Zheng',cursive}
.life-quote{margin-top:14px;padding:14px 18px;border-left:2px solid var(--cinnabar);background:rgba(194,59,34,0.04);border-radius:0 6px 6px 0;font-size:13px;color:var(--text-muted);font-style:italic;line-height:1.8}
.life-skill{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.life-skill span{padding:3px 10px;border-radius:12px;font-size:11px;border:1px solid rgba(201,168,76,0.15);color:var(--text-muted);background:rgba(201,168,76,0.03)}
.life-bazi-link{margin-top:10px;padding:10px 14px;background:rgba(201,168,76,0.04);border:1px solid rgba(201,168,76,0.1);border-radius:6px;font-size:11px;color:var(--text-dim);line-height:1.7}
.life-bazi-link b{color:var(--gold-light)}
.life-soul-score{text-align:center;margin:24px 0;padding:28px;background:linear-gradient(145deg,rgba(42,34,28,0.96),rgba(26,20,16,0.99));border:1px solid rgba(201,168,76,0.2);border-radius:12px}
.life-soul-score .score-label{font-size:12px;color:var(--text-muted);letter-spacing:3px;margin-bottom:8px}
.life-soul-score .score-num{font-family:'Ma Shan Zheng',cursive;font-size:64px;color:var(--gold);text-shadow:0 0 40px var(--gold-glow)}
.life-soul-score .score-desc{font-size:13px;color:var(--text-muted);margin-top:8px;line-height:1.6}
.life-summary{text-align:center;padding:24px;margin-top:16px;background:rgba(194,59,34,0.05);border:1px solid rgba(194,59,34,0.12);border-radius:10px}
.life-summary h3{font-family:'Ma Shan Zheng',cursive;font-size:22px;color:var(--cinnabar-light);margin-bottom:12px}
.life-summary p{font-size:13px;color:var(--text-muted);line-height:2;max-width:600px;margin:0 auto}
.btn-area{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:28px}
.btn-area .btn{max-width:300px}
.back-link{text-align:center;margin-top:16px}
.back-link a{color:var(--text-muted);font-size:13px;text-decoration:none;border-bottom:1px solid rgba(201,168,76,0.15);padding-bottom:2px}
.back-link a:hover{color:var(--gold)}
@media(max-width:500px){.life-details{grid-template-columns:1fr}.bazi-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="bg-layer"><div class="grad"></div><div class="pattern"></div></div>
<div class="float-char">命</div><div class="float-char">缘</div><div class="float-char">轮</div><div class="float-char">回</div>
<div class="main">
  <div class="header">
    <div class="header-badge">天 命 阁</div>
    <div class="header-title">前世轮回<span class="title-deco"></span></div>
    <div class="header-sub">孟婆汤忘前尘事 · 六道轮回续今生缘</div>
    <div class="header-desc">以八字命盘为引，以易经五行推演，追溯灵魂五世轮回之旅。前世种种皆为今世因果，诸般因缘际会汇聚于此身。</div>
  </div>
  <div class="divider"><span class="divider-line l"></span><span>◈</span><span class="divider-line r"></span></div>
  <div id="inputSection">
    <div class="input-group">
      <label>姓名</label>
      <input type="text" id="pName" placeholder="请输入您的姓名...">
    </div>
    <div class="input-group">
      <label>性别</label>
      <select id="pGender">
        <option value="">-- 请选择 --</option>
        <option value="male">乾造 · 男命</option>
        <option value="female">坤造 · 女命</option>
      </select>
    </div>
    <div class="input-group">
      <label>出生年份（公历）</label>
      <select id="pYear">
        <option value="">-- 请选择 --</option>
      </select>
    </div>
    <div class="input-group">
      <label>出生月份</label>
      <select id="pMonth"><option value="">-- 请选择 --</option><option value="1">1月</option><option value="2">2月</option><option value="3">3月</option><option value="4">4月</option><option value="5">5月</option><option value="6">6月</option><option value="7">7月</option><option value="8">8月</option><option value="9">9月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option></select>
    </div>
    <div class="input-group">
      <label>出生日期</label>
      <select id="pDay"><option value="">-- 请选择 --</option><option value="1">1日</option><option value="2">2日</option><option value="3">3日</option><option value="4">4日</option><option value="5">5日</option><option value="6">6日</option><option value="7">7日</option><option value="8">8日</option><option value="9">9日</option><option value="10">10日</option><option value="11">11日</option><option value="12">12日</option><option value="13">13日</option><option value="14">14日</option><option value="15">15日</option><option value="16">16日</option><option value="17">17日</option><option value="18">18日</option><option value="19">19日</option><option value="20">20日</option><option value="21">21日</option><option value="22">22日</option><option value="23">23日</option><option value="24">24日</option><option value="25">25日</option><option value="26">26日</option><option value="27">27日</option><option value="28">28日</option><option value="29">29日</option><option value="30">30日</option><option value="31">31日</option></select>
    </div>
    <div class="input-group">
      <label>出生时辰</label>
      <select id="pHour"><option value="">-- 请选择（不知可选不详）--</option><option value="0">子时 23:00-00:59</option><option value="1">丑时 01:00-02:59</option><option value="2">寅时 03:00-04:59</option><option value="3">卯时 05:00-06:59</option><option value="4">辰时 07:00-08:59</option><option value="5">巳时 09:00-10:59</option><option value="6">午时 11:00-12:59</option><option value="7">未时 13:00-14:59</option><option value="8">申时 15:00-16:59</option><option value="9">酉时 17:00-18:59</option><option value="10">戌时 19:00-20:59</option><option value="11">亥时 21:00-22:59</option><option value="-1">不详</option></select>
    </div>
    <div style="text-align:center;margin-top:28px">
      <button class="btn btn-primary" id="startBtn">◈ 开 启 轮 回 ◈</button>
    </div>
  </div>
  <div class="load" id="loading">
    <div class="load-ring"><div class="r"></div><div class="r"></div><div class="r"></div></div>
    <div class="load-txt" id="loadTxt">正在打开轮回之门...</div>
    <div class="load-sub" id="loadSub">沟通冥界中，请耐心等待</div>
  </div>
  <div id="resultSection" style="display:none"></div>
</div>
<script>
// 填充年份
(function() {
  var sel = document.getElementById('pYear');
  for (var y = 2010; y >= 1940; y--) {
    var o = document.createElement('option');
    o.value = y;
    o.text = y + '年';
    sel.add(o);
  }
})();

// ===== 八字命理核心数据 =====
var TIAN_GAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
var DI_ZHI = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
var WU_XING_GAN = {'甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土','庚':'金','辛':'金','壬':'水','癸':'水'};
var WU_XING_ZHI = {'子':'水','丑':'土','寅':'木','卯':'木','辰':'土','巳':'火','午':'火','未':'土','申':'金','酉':'金','戌':'土','亥':'水'};
var WU_XING_SHENG = {'木':'火','火':'土','土':'金','金':'水','水':'木'};
var WU_XING_KE = {'木':'土','火':'金','土':'水','金':'木','水':'火'};
var WX_CLASS = {'金':'wx-jin','木':'wx-mu','水':'wx-shui','火':'wx-huo','土':'wx-tu'};

// 纳音五行（六甲纳音）
var NAYIN = [
  '海中金','炉中火','大林木','路旁土','剑锋金','山头火',
  '涧下水','城头土','白蜡金','杨柳木','泉中水','屋上土',
  '霹雳火','松柏木','长流水','砂中金','山下火','平地木',
  '壁上土','金箔金','覆灯火','天河水','大驿土','钗环金',
  '桑柘木','大溪水','砂中土','天上火','石榴木','大海水'
];

// 天干五行数
var GAN_NUM = {'甲':1,'乙':2,'丙':3,'丁':4,'戊':5,'己':6,'庚':7,'辛':8,'壬':9,'癸':10};
// 地支五行数
var ZHI_NUM = {'子':1,'丑':2,'寅':3,'卯':4,'辰':5,'巳':6,'午':7,'未':8,'申':9,'酉':10,'戌':11,'亥':12};

// 十神关系（以日主为基准）
var SHI_SHEN_MAP = {
  'same': {'positive':'比肩','negative':'劫财'},
  'i_sheng': {'positive':'食神','negative':'伤官'},
  'i_ke': {'positive':'偏财','negative':'正财'},
  'me_sheng': {'positive':'偏印','negative':'正印'},
  'me_ke': {'positive':'七杀','negative':'正官'}
};

// 十二生肖
var SHENG_XIAO = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];

// ===== 八字计算 =====
function calcYearGZ(year) {
  var ganIdx = (year - 4) % 10;
  var zhiIdx = (year - 4) % 12;
  return {gan: TIAN_GAN[ganIdx], zhi: DI_ZHI[zhiIdx], ganIdx: ganIdx, zhiIdx: zhiIdx};
}

function calcMonthGZ(yearGanIdx, month) {
  // 年上起月法：甲己之年丙作首，乙庚之年戊为头...
  var startGanMap = [2, 4, 6, 8, 0, 2, 4, 6, 8, 0]; // 甲->寅月从丙(2)开始
  var startGan = startGanMap[yearGanIdx];
  var mZhiIdx = (month + 1) % 12; // 寅=1月->zhiIdx=2
  var mGanIdx = (startGan + month - 1) % 10;
  return {gan: TIAN_GAN[mGanIdx], zhi: DI_ZHI[mZhiIdx], ganIdx: mGanIdx, zhiIdx: mZhiIdx};
}

function calcDayGZ(year, month, day) {
  // 简化的日干支计算（以2000年1月7日甲子日为基准偏移）
  var base = new Date(2000, 0, 7);
  var target = new Date(year, month - 1, day);
  var diff = Math.round((target - base) / 86400000);
  var ganIdx = ((diff % 10) + 10) % 10;
  var zhiIdx = ((diff % 12) + 12) % 12;
  return {gan: TIAN_GAN[ganIdx], zhi: DI_ZHI[zhiIdx], ganIdx: ganIdx, zhiIdx: zhiIdx};
}

function calcHourGZ(dayGanIdx, hourIdx) {
  // 日上起时法
  var startGanMap = [0, 2, 4, 6, 8, 0, 2, 4, 6, 8];
  var startGan = startGanMap[dayGanIdx];
  var hGanIdx = (startGan + hourIdx) % 10;
  return {gan: TIAN_GAN[hGanIdx], zhi: DI_ZHI[hourIdx], ganIdx: hGanIdx, zhiIdx: hourIdx};
}

function getNayin(ganIdx, zhiIdx) {
  var idx = (ganIdx % 6) * 10 + (zhiIdx % 12);
  // 纳音索引需要特殊计算
  var pair = Math.floor(ganIdx / 2) * 12 + zhiIdx;
  var nayinIdx = pair % 30;
  return NAYIN[nayinIdx];
}

function getWXRelation(myWX, otherWX) {
  if (myWX === otherWX) return 'same';
  if (WU_XING_SHENG[myWX] === otherWX) return 'i_sheng';
  if (WU_XING_KE[myWX] === otherWX) return 'i_ke';
  if (WU_XING_SHENG[otherWX] === myWX) return 'me_sheng';
  if (WU_XING_KE[otherWX] === myWX) return 'me_ke';
  return 'same';
}

function isYangGan(ganIdx) { return ganIdx % 2 === 0; }

function getShiShen(dayGanIdx, ganIdx) {
  var dayWX = WU_XING_GAN[TIAN_GAN[dayGanIdx]];
  var otherWX = WU_XING_GAN[TIAN_GAN[ganIdx]];
  var rel = getWXRelation(dayWX, otherWX);
  var dayYang = isYangGan(dayGanIdx);
  var otherYang = isYangGan(ganIdx);
  var positive = (dayYang === otherYang);
  return SHI_SHEN_MAP[rel][positive ? 'positive' : 'negative'];
}

function calcBazi(year, month, day, hourIdx) {
  var yGZ = calcYearGZ(year);
  var mGZ = calcMonthGZ(yGZ.ganIdx, month);
  var dGZ = calcDayGZ(year, month, day);
  var hGZ = calcHourGZ(dGZ.ganIdx, hourIdx);
  return {
    year: yGZ, month: mGZ, day: dGZ, hour: hGZ,
    yearNayin: getNayin(yGZ.ganIdx, yGZ.zhiIdx),
    dayNayin: getNayin(dGZ.ganIdx, dGZ.zhiIdx),
    dayMaster: TIAN_GAN[dGZ.ganIdx],
    dayMasterWX: WU_XING_GAN[TIAN_GAN[dGZ.ganIdx]]
  };
}

// ===== 五行分析 =====
function analyzeWX(bazi) {
  var count = {金:0, 木:0, 水:0, 火:0, 土:0};
  var pillars = [bazi.year, bazi.month, bazi.day, bazi.hour];
  for (var i = 0; i < pillars.length; i++) {
    count[WU_XING_GAN[TIAN_GAN[pillars[i].ganIdx]]]++;
    count[WU_XING_ZHI[pillars[i].zhi]]++;
  }
  var max = 0, maxWX = '土';
  var keys = ['金','木','水','火','土'];
  for (var i = 0; i < keys.length; i++) {
    if (count[keys[i]] > max) { max = count[keys[i]]; maxWX = keys[i]; }
  }
  var missing = [];
  for (var i = 0; i < keys.length; i++) {
    if (count[keys[i]] === 0) missing.push(keys[i]);
  }
  return {count:count, dominant: maxWX, missing: missing};
}

function getShiShenMeaning(ss) {

  return m[ss] || '综合运势';
}

  html += '<div class="btn-area">';

  html += '<button class="btn btn-outline" onclick="location.href=\'index.html\'">◈ 返回天命阁 ◈</button>';
  html += '</div>';
  html += '<div class="back-link"><a href="index.html">← 返回首页</a></div>';

  document.getElementById('resultSection').innerHTML = html;
}

// ===== 提交 =====
document.getElementById('startBtn').addEventListener('click', function() {
  var name = document.getElementById('pName').value.trim();
  var gender = document.getElementById('pGender').value;
  var year = document.getElementById('pYear').value;
  var month = document.getElementById('pMonth').value;
  var day = document.getElementById('pDay').value;
  var hourVal = document.getElementById('pHour').value;

  if (!name) { alert('请输入您的姓名'); return; }
  if (!gender) { alert('请选择性别'); return; }
  if (!year || !month || !day) { alert('请完整填写出生日期'); return; }
  if (!hourVal) { alert('请选择出生时辰'); return; }

  var hourIdx = parseInt(hourVal);
  var bazi = calcBazi(parseInt(year), parseInt(month), parseInt(day), hourIdx);
  var wxAnalysis = analyzeWX(bazi);
  var lives = derivePastLife(0, bazi, wxAnalysis, gender, name);

  document.getElementById('inputSection').style.display = 'none';
  var load = document.getElementById('loading');
  load.classList.add('active');

  var texts = [
    '正在打开轮回之门...沟通冥界中...',
    '翻阅生死簿中...追忆前尘往事...',
    '推演八字命盘...追溯五行根基...',
    '以'+bazi.dayMaster+'日主推演前世因果...',
    '五世轮回显现...前世画卷展开...'
  ];
  var idx = 0;
  var loadTxt = document.getElementById('loadTxt');
  var loadSub = document.getElementById('loadSub');
  var timer = setInterval(function() {
    idx = (idx + 1) % texts.length;
    loadTxt.textContent = texts[idx].split('...')[0] + '...';
    loadSub.textContent = texts[idx].split('...')[1] || '';
  }, 1800);

  setTimeout(function() {
    clearInterval(timer);
    load.classList.remove('active');
    renderResult(name, gender, bazi, wxAnalysis, lives);
    var rs = document.getElementById('resultSection');
    rs.style.display = 'block';
    rs.style.opacity = '0';
    setTimeout(function() {
      rs.style.transition = 'opacity 0.8s';
      rs.style.opacity = '1';
      rs.scrollIntoView({behavior: 'smooth', block: 'start'});
    }, 50);
  }, 5500);
});
</script>
</body>
</html>
